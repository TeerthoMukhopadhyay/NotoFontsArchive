name: Ultimate Noto Archive Final Fix

on:
  workflow_dispatch:

jobs:
  build-archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Setup and Collect
        run: |
          # ১. ডিরেক্টরি তৈরি
          mkdir -p Non-CJK CJK Emoji
          
          # ২. সোর্স ক্লোন (শুধু প্রয়োজনীয় ডাটা)
          git clone --depth 1 https://github.com/notofonts/notofonts.github.io.git source

          # ৩. প্রসেসিং ফাংশন
          process_fonts() {
            local src_dir=$1
            local target_base=$2
            
            mkdir -p "$target_base/ttf-static" "$target_base/ttf-static-slim" \
                     "$target_base/ttf-variable" "$target_base/ttf-variable-slim" \
                     "$target_base/otf-static" "$target_base/otf-static-slim" \
                     "$target_base/otf-variable" "$target_base/otf-variable-slim"

            # রিকার্সিভলি ফন্ট খুঁজে বের করা (যাতে কোনো সাব-ফোল্ডারে থাকলেও পাওয়া যায়)
            find "$src_dir" -type f \( -iname "*.ttf" -o -iname "*.otf" \) | while read -r file; do
              filename=$(basename "$file")
              ext="${filename##*.}"
              ext_l=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
              
              is_var=false
              [[ "$filename" == *"Variable"* || "$filename" == *"["* ]] && is_var=true

              if [ "$ext_l" = "ttf" ]; then
                if [ "$is_var" = true ]; then
                  cp -n "$file" "$target_base/ttf-variable/"
                  cp -n "$file" "$target_base/ttf-variable-slim/"
                else
                  cp -n "$file" "$target_base/ttf-static/"
                  [[ "$filename" =~ (Regular|Bold)\.ttf$ ]] && cp -n "$file" "$target_base/ttf-static-slim/"
                fi
              elif [ "$ext_l" = "otf" ]; then
                if [ "$is_var" = true ]; then
                  cp -n "$file" "$target_base/otf-variable/"
                  cp -n "$file" "$target_base/otf-variable-slim/"
                else
                  cp -n "$file" "$target_base/otf-static/"
                  [[ "$filename" =~ (Regular|Bold)\.otf$ ]] && cp -n "$file" "$target_base/otf-static-slim/"
                fi
              fi
            done
          }

          # ৪. সোর্স স্ক্যানিং
          find source/fonts -maxdepth 1 -type d ! -path "source/fonts" | while read -r script_path; do
            s_name=$(basename "$script_path")
            
            # অগ্রাধিকার Full > Hinted > মূল ফোল্ডার
            if [ -d "$script_path/full" ]; then
              f_src="$script_path/full"
            elif [ -d "$script_path/hinted" ]; then
              f_src="$script_path/hinted"
            else
              f_src="$script_path"
            fi

            if [[ "$s_name" == *"cjk"* ]]; then
              process_fonts "$f_src" "CJK"
            elif [[ "$s_name" == *"emoji"* ]]; then
              process_fonts "$f_src" "Emoji"
            else
              process_fonts "$f_src" "Non-CJK"
            fi
          done

      - name: Create Zip Archives
        run: |
          # যদি ফোল্ডারে ফাইল থাকে তবেই জিপ করবে, নয়তো এরর দেবে না
          [ "$(ls -A Non-CJK/ttf-static)" ] && (cd Non-CJK && zip -r ../Noto_Non-CJK.zip .) || echo "Non-CJK empty"
          [ "$(ls -A CJK/ttf-static)" ] && (cd CJK && zip -r ../Noto_CJK.zip .) || echo "CJK empty"
          [ "$(ls -A Emoji/ttf-static)" ] && (cd Emoji && zip -r ../Noto_Emoji.zip .) || echo "Emoji empty"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Ultimate Noto Archive - $(date +'%d-%m-%Y')"
          files: |
            Noto_Non-CJK.zip
            Noto_CJK.zip
            Noto_Emoji.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
