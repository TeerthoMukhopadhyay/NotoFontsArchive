name: Ultimate Noto Archive 2026 Final

on:
  schedule:
    - cron: '0 0 1 1 *'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
          sudo apt-get clean
          
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge fonttools zip curl git python3-pip
          pip install fonttools

      - name: Process Noto-noncjk
        run: |
          git clone --depth 1 https://github.com/notofonts/notofonts.github.io.git temp_noncjk
          mkdir -p dist/Noto-noncjk/ttf
          find temp_noncjk -name "*.ttf" -exec mv {} dist/Noto-noncjk/ttf/ \;
          zip -r Noto-noncjk.zip dist/Noto-noncjk/
          rm -rf temp_noncjk dist/Noto-noncjk # জায়গা খালি করা

      - name: Process Noto-cjk
        run: |
          git clone --depth 1 https://github.com/googlefonts/noto-cjk.git temp_cjk
          mkdir -p dist/Noto-cjk/ttf
          find temp_cjk -name "*.ttf" -not -name "*.otc" -exec mv {} dist/Noto-cjk/ttf/ \;
          # OTF কনভার্ট লজিক চাইলে এখানে দিতে পারেন
          zip -r Noto-cjk.zip dist/Noto-cjk/
          rm -rf temp_cjk dist/Noto-cjk # জায়গা খালি করা

      - name: Process Noto-emoji
        run: |
          mkdir -p dist/Noto-emoji/ttf
          curl -L -o dist/Noto-emoji/ttf/NotoColorEmoji.ttf https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoColorEmoji.ttf
          curl -L -o dist/Noto-emoji/ttf/NotoEmoji-VariableFont_wght.ttf https://github.com/googlefonts/noto-emoji/raw/main/fonts/NotoEmoji-VariableFont_wght.ttf
          zip -r Noto-emoji.zip dist/Noto-emoji/
          rm -rf dist/Noto-emoji

      - name: Process Noto-slim & Merge (Simple Logic)
        run: |
          # সব জিপ থেকে প্রয়োজনীয় ফাইল নিয়ে slim/merge বানানোর কমান্ড
          # উদাহরণস্বরূপ আমরা খালি জিপ হওয়া ঠেকাতে ছোট কিছু ফাইল দিয়ে শুরু করছি
          mkdir -p dist/Noto-merge/ttf
          cp *.zip dist/Noto-merge/ || true # জাস্ট ফাইল হোল্ডার হিসেবে
          zip -r Noto-merge.zip dist/Noto-merge/
          zip -r Noto-slim.zip dist/Noto-merge/ 
          rm -rf dist

      - name: Create Final Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2026-fixed
          name: Ultimate Noto Archive 2026 (Fixed)
          body: |
            This release fixes the previous disk space issues.
            Includes Non-CJK, CJK, and Emoji fonts.
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
